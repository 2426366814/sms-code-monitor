<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API测试 - 多用户动态验证码监控系统</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 20px; color: #4ade80; }
        .section { background: rgba(30, 41, 59, 0.9); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(71, 85, 105, 0.5); }
        .section h2 { margin-bottom: 15px; color: #38bdf8; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.3s; margin: 5px; }
        .btn-primary { background: linear-gradient(135deg, #4ade80 0%, #2dd4bf 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(74, 222, 128, 0.4); }
        .btn-danger { background: linear-gradient(135deg, #ef4444 0%, #f87171 100%); color: white; }
        .btn-secondary { background: rgba(30, 41, 59, 0.8); color: #e2e8f0; border: 1px solid rgba(71, 85, 105, 0.5); }
        .input { width: 100%; padding: 10px 14px; border: 1px solid rgba(71, 85, 105, 0.5); border-radius: 8px; background: rgba(15, 23, 42, 0.8); color: #e2e8f0; font-size: 14px; margin: 5px 0; }
        .input:focus { outline: none; border-color: #4ade80; box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1); }
        .result { background: rgba(15, 23, 42, 0.8); border-radius: 8px; padding: 15px; margin-top: 15px; font-family: 'SF Mono', 'Monaco', monospace; font-size: 13px; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        .row { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
        .col { flex: 1; min-width: 200px; }
        label { display: block; margin: 8px 0 4px; color: #94a3b8; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 API 完整测试</h1>
        
        <div class="section">
            <h2>1. 登录</h2>
            <div class="row">
                <div class="col">
                    <label>用户名</label>
                    <input type="text" id="username" class="input" value="admin">
                </div>
                <div class="col">
                    <label>密码</label>
                    <input type="password" id="password" class="input" value="admin">
                </div>
            </div>
            <button class="btn btn-primary" onclick="testLogin()">登录</button>
            <div id="loginResult" class="result"></div>
        </div>
        
        <div class="section">
            <h2>2. 获取监控列表</h2>
            <button class="btn btn-primary" onclick="testGetMonitors()">获取监控列表</button>
            <div id="monitorsResult" class="result"></div>
        </div>
        
        <div class="section">
            <h2>3. 添加监控</h2>
            <div class="row">
                <div class="col">
                    <label>手机号</label>
                    <input type="text" id="addPhone" class="input" placeholder="13800138000">
                </div>
                <div class="col">
                    <label>API URL</label>
                    <input type="text" id="addUrl" class="input" placeholder="https://example.com">
                </div>
            </div>
            <button class="btn btn-primary" onclick="testAddMonitor()">添加监控</button>
            <div id="addResult" class="result"></div>
        </div>
        
        <div class="section">
            <h2>4. 删除监控</h2>
            <div class="row">
                <div class="col">
                    <label>监控ID</label>
                    <input type="number" id="deleteId" class="input" placeholder="1">
                </div>
            </div>
            <button class="btn btn-danger" onclick="testDeleteMonitor()">删除监控</button>
            <div id="deleteResult" class="result"></div>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://jm.91wz.org';
        let token = '';
        
        function showResult(elementId, data, isSuccess = true) {
            const el = document.getElementById(elementId);
            el.className = 'result ' + (isSuccess ? 'success' : 'error');
            el.textContent = JSON.stringify(data, null, 2);
        }
        
        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${BASE_URL}/backend/api/auth/index.php?action=login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                showResult('loginResult', data, data.success);
                
                if (data.success && data.data && data.data.token) {
                    token = data.data.token;
                    console.log('✅ Token obtained:', token);
                }
            } catch (error) {
                showResult('loginResult', { error: error.message }, false);
            }
        }
        
        async function testGetMonitors() {
            if (!token) {
                showResult('monitorsResult', { error: '请先登录' }, false);
                return;
            }
            
            try {
                const response = await fetch(`${BASE_URL}/backend/api/monitors/index.php`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                showResult('monitorsResult', data, data.success);
            } catch (error) {
                showResult('monitorsResult', { error: error.message }, false);
            }
        }
        
        async function testAddMonitor() {
            if (!token) {
                showResult('addResult', { error: '请先登录' }, false);
                return;
            }
            
            const phone = document.getElementById('addPhone').value;
            const url = document.getElementById('addUrl').value;
            
            try {
                const response = await fetch(`${BASE_URL}/backend/api/monitors/index.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ phone_number: phone, url: url })
                });
                
                const data = await response.json();
                showResult('addResult', data, data.success);
            } catch (error) {
                showResult('addResult', { error: error.message }, false);
            }
        }
        
        async function testDeleteMonitor() {
            if (!token) {
                showResult('deleteResult', { error: '请先登录' }, false);
                return;
            }
            
            const id = document.getElementById('deleteId').value;
            
            try {
                const response = await fetch(`${BASE_URL}/backend/api/monitors/index.php?id=${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                showResult('deleteResult', data, data.success);
            } catch (error) {
                showResult('deleteResult', { error: error.message }, false);
            }
        }
    </script>
</body>
</html>
